name: Deploy Hermes Static App to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: hermes-cloud-app-rm551549
  CLOUDFRONT_DISTRIBUTION_ID: COLOQUE_AQUI_O_ID_DA_DISTRIBUICAO

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::ID_DA_CONTA:role/HermesGitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate access to Parameter Store
        run: |
          aws ssm get-parameter \
            --name "/hermes/prod/project-secret" \
            --with-decryption \
            --region $AWS_REGION

      - name: Deploy files to S3
        run: |
          aws s3 sync . s3://$S3_BUCKET \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "docs/*" \
            --exclude "README.md"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"
